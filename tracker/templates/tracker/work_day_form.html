<!DOCTYPE html>
<html>
<head>
    <title>Dodaj dzień pracy</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">

    <h2 class="mb-4">Dodaj dzień pracy</h2>

    <form method="post" class="card p-4">
        {% csrf_token %}

        <h5>Dane dnia</h5>
        {{ form.as_p }}

        <hr>

        <h5>Przedziały pracy</h5>

        {{ formset.management_form }}

        <div id="period-forms">
            {% for period_form in formset %}
                <div class="period-form border rounded p-3 mb-3 bg-white">
                    {{ period_form.as_p }}
                </div>
            {% endfor %}
        </div>

        <button type="button" class="btn btn-outline-primary mb-3" id="add-period">
            + Dodaj kolejny przedział
        </button>

        <div>
            <button type="submit" class="btn btn-success">Zapisz</button>
            <a href="{% url 'work_day_list' %}" class="btn btn-secondary">Anuluj</a>
        </div>
    </form>

</div>


<script>
    const addButton = document.getElementById("add-period");
    const formContainer = document.getElementById("period-forms");
    const totalForms = document.getElementById("id_periods-TOTAL_FORMS");

    addButton.addEventListener("click", function () {
        const currentFormCount = parseInt(totalForms.value);

        const firstForm = document.querySelector(".period-form");
        const newForm = firstForm.cloneNode(true);

        const formRegex = new RegExp("periods-(\\d+)-", "g");

        newForm.innerHTML = newForm.innerHTML.replace(
            formRegex,
            `periods-${currentFormCount}-`
        );

        newForm.querySelectorAll("input").forEach(input => {
            if (input.type !== "hidden") {
                input.value = "";
            }

            if (input.type === "checkbox") {
                input.checked = false;
            }
        });

        formContainer.appendChild(newForm);
        totalForms.value = currentFormCount + 1;
    });
</script>

</body>
</html>
