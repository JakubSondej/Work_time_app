<!DOCTYPE html>
<html>
<head>
    <title>Usuń dzień pracy</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="card p-4">
        <h2>Usuń dzień pracy</h2>

        <p>Czy na pewno chcesz usunąć wpis z dnia <strong>{{ work_day.date }}</strong>?</p>

        <form method="post">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger">Tak, usuń</button>
            <a href="{% url 'work_day_list' %}" class="btn btn-secondary">Anuluj</a>
        </form>
    </div>
</div>

</body>
</html>
